<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="imagen/cheque.png">
    <link rel="stylesheet" href="estilos/cheque.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear factura</title>
</head>
<body>

    <header>
        <img src="imagen/Happy.png" alt="">
        <div id="title">
            <h1>Happy Puppies</h1>
        </div>
        <div id="usuario">
            <h2><a href="usuario.html">Usuario</a></h2>
        </div>
    </header>
            <form action="" method="post" >
                <h1>Ingrese los datos:</h1>
                <br>
                <!--Aquie es para poner el  nombre del titular o usario del cheque-->
                <label for="" class="nomb">Nombre de Usuario:</label>
                <input type="text" name="nombre_usuario" id="nombre_usuario" required placeholder="Nombre del cliente">
                
                <!--Aqui es para poner el dia, el mes y el año-->
                <label for="">Fecha:</label>
                <input type="date" name="fecha" id="fecha" required>

                <!--Aqui es para poner la hora-->
                <label for="" class="hora">hora:</label>
                <input type="time" name="hora" id="hora" required><br><br>
                <hr>
                <br>

                <!--Aqui se agregan los productos-->

                <!--Boton de subir y enviar tambien borrar-->
                <input type="submit" value="Guardar" id="save">
                <button id="trw">Imprimir</button>
                <input type="reset" value="Borrar todo"  id="borrartodo">
            </form>

            <button id="Add" onclick="window.location.href='mofi.html'">ADD</button>
            
        <table id="tabla1">
        <thead>
            <tr>
                <th>Codigo</th>
                <th>PD O SE</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <!--Aqui va el contenido del detalle de factura-->
        <tbody id="contenido">
            <tr>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td>

                    <input type="button"  value="MODIFI" id="modifi" onclick="window.location.href='mofi.html'" >
                    <input type="button" value="DELETE" id="delete">

                </td>
                
            </tr>
        </tbody>
    </table>

</body>
</html>
